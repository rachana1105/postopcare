<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ERP{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
    body {
        background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
                          url("{{ url_for('static', filename='images/hospital_bg.png') }}");
        background-size: cover;
        background-repeat: no-repeat;
        background-attachment: fixed;
        background-position: center;
        color: #f8f9fa;
        min-height: 100vh;
    }

    body::before {
        content: '';
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(2px);
        z-index: -1;
    }

    .navbar {
        padding: 1rem 2rem;
        border-radius: 8px;
        background: linear-gradient(90deg, #0d6efd, #6610f2);
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4);
    }

    /* ✨ Customize Navbar Brand (postOPcare) */
    .navbar-brand {
        font-size: 28px;
        font-weight: bold;
        color: #ffca28 !important;
        text-shadow: 1px 1px 2px #000;
    }

    /* ✨ Customize Navbar Links (Register, Dashboard) */
    .nav-link {
        font-size: 20px;
        font-weight: 500;
        color: #ffffff !important;
        transition: color 0.3s ease;
    }

    .nav-link:hover {
        color: #ffc107 !important;
        text-decoration: underline;
    }

    .card, .container-content {
        background-color: rgba(0, 0, 0, 0.7) !important;
        border-radius: 15px;
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.5);
        padding: 20px;
    }

    .form-control {
        background-color: rgba(255, 255, 255, 0.1) !important;
        color: #fff !important;
        border: 1px solid #6c757d;
        box-shadow: 0 0 8px rgba(13, 110, 253, 0.3);
    }

    .form-control::placeholder {
        color: #dee2e6;
    }

    label {
        color: #f8f9fa;
        font-weight: 500;
    }

    h1, h2, h4 {
        color: #ffc107;
    }

    .btn-outline-light:hover {
        background-color: #fff;
        color: #000;
    }
</style>

</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark mb-4 mx-3 mt-3">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold text-light" href="/">postOPcare</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/register">Register</a></li>
                    <li class="nav-item"><a class="nav-link" href="/dashboard">Dashboard</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Page Content Block -->
    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
